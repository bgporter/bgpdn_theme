{% extends "base.html" %}

{% block title %}{{ page.title }} · {{ SITENAME }}{% endblock %}

{% block content %}
<article>
  <header class="article-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="content">
    {{ page.content }}
  </div>
</article>
{% endblock %}
