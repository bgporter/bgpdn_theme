{% extends "base.html" %}

{% block title %}{{ page.title }} · {{ SITENAME }}{% endblock %}

{% block content %}
{% set is_changelog = page.slug and 'changelog' in page.slug %}
<article{% if is_changelog %} class="changelog-page"{% endif %}>
  <header class="article-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="content{% if is_changelog %} changelog{% endif %}">
    {{ page.content }}
  </div>
</article>
{% endblock %}
